[Fixes]
; Reduces ragdoll physics instability (flying corpses/limbs) at high FPS
; 0 = Disabled, 1 = Enabled
HavokPhysicsFix = 1

; Prevent crash on CPUs with more than 10 cores
; 0 = Disabled, 1 = Enabled
HighCoreCPUFix = 1

; Fix VSync to use the selected refresh rate instead of locking to 30 FPS
; 0 = Disabled, 1 = Enabled
VSyncRefreshRateFix = 1

; Fix difficulty reward tracking for save file completions
; Ensures Hardcore/Zealot difficulty rewards unlock properly
; 0 = Disabled, 1 = Enabled
FixDifficultyRewards = 1

; Fix item ID conflicts that cause suits to disappear when certain suits are purchased
; 0 = Disabled, 1 = Enabled
FixSuitIDConflicts = 1

; Fix save file string handling to prevent buffer overflows
; 0 = Disabled, 1 = Enabled
FixSaveStringHandling = 1

; Fix automatic weapons firing at inconsistent rates at different framerates
; 0 = Disabled, 1 = Enabled
FixAutomaticWeaponFireRate = 1

[General]
; Disable online connectivity attempts and hide related error messages
; Prevents connection attempts to dead servers and removes "disconnected" warnings
; 0 = Disabled, 1 = Enabled
DisableOnlineFeatures = 1

; Allow more bodies to persist in the current area
; 0 = Disabled, 1 = Enabled
IncreasedEntityPersistence = 1

; Number of bodies to persist when IncreasedEntityPersistence is enabled 
IncreasedEntityPersistenceBodies = 25

; Number of limbs to persist when IncreasedEntityPersistence is enabled 
IncreasedEntityPersistenceLimbs = 96

; Allow more detailed decals
; 0 = Disabled, 1 = Enabled
IncreasedDecalPersistence = 1

; Skip intro video on game launch
; 0 = Disabled, 1 = Enabled
SkipIntro = 0

; Prompts to apply a Large Address Aware (LAA) patch when necessary, enabling the use of up to 4GB of memory instead of the default 2GB
; Note: Applying this patch will modify the game executable
; 0 = Disabled, 1 = Enabled
CheckLAAPatch = 0

[Display]
; Automatically set resolution to match screen size on first launch
; 0 = Disabled, 1 = Enabled
AutoResolution = 1

; Enable or disable scaling of subtitle fonts for high resolutions
; 0 = Disabled, 1 = Enabled
FontScaling = 1

; Scaling factor for subtitle fonts (1.0 = default size)
; Values less than 1.0 make subtitles smaller, values greater than 1.0 make subtitles larger
FontScalingFactor = 1.0

[Input]
; Enable raw mouse input to make sensitivity independent of framerate
; 0 = Disabled, 1 = Enabled
RawMouseInput = 1

; Override XInput with SDL controller handling
; 0 = Disabled, 1 = Enabled
UseSDLControllerInput = 1

; Block all DirectInput devices except mouse and keyboard
; Note: Does not affect XInput controllers
; 0 = Disabled, 1 = Enabled
BlockDirectInputDevices = 1

; Enable gyroscope aiming 
; Require 'RawMouseInput' to be enabled
; If you experience gyro drift, place the controller on a stable surface for a few seconds to calibrate
; 0 = Disabled, 1 = Enabled
GyroEnabled = 0

; Gyro sensitivity multiplier
; Default: 1.0
GyroSensitivity = 1.0

; Gyro smoothing factor to reduce sensor noise (0.0 = no smoothing, higher = smoother but less responsive)
; Default: 0.016
GyroSmoothing = 0.016

; Enable Touchpad mouse emulation
; 0 = Disabled, 1 = Enabled
TouchpadEnabled = 1

[Graphics]
; Enable anisotropic texture filtering to enhance texture clarity and reduce blurriness at oblique viewing angles
; Specify the maximum level of anisotropic filtering to use
; A value of 0 will disable this feature
; Recommended values: 2, 4, 8, or 16
MaxAnisotropy = 16

; Force trilinear filtering
; 0 = Disabled, 1 = Enabled
ForceTrilinearFiltering = 1

[DLC]
; Enable Hazard Pack DLC items in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableHazardPack = 0

; Enable Martial Law Pack DLC items in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableMartialLawPack = 0

; Enable Supernova Pack DLC items in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableSupernovaPack = 0

; Enable Severed story DLC items in shop (Patrol Suit and Patrol Seeker Rifle)
; 0 = Hidden from shop, 1 = Available in shop
EnableSeveredDLC = 0

; Enable Hacker Suit and Hacker Contact Beam DLC items in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableHackerDLC = 0

; Enable Zealot Suit and Zealot Force Gun DLC items in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableZealotDLC = 0

; Enable Rivet Gun DLC item in shop
; 0 = Hidden from shop, 1 = Available in shop
EnableRivetGunDLC = 0

